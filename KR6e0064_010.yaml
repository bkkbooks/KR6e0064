body:
  text: 後魏釋靈辨造如來光明覺品第五光明開覺者上道場會聖者普賢以佛智明力用示如來樹王所證法身依果清淨具足自在無礙為應化根本猶如大海出百川流隨眾生噐水示月輪身無不對見聖者文殊菩薩復開示名號四諦法門權道隨一切世間眾生根生應無量身雲悉分別說顯示四種權道充滿法界一者身權隨群生噐水示根淨方便無量身雲一切悉現故二者依果權隨諸業集垢淨剎土無礙興起充滿世間故三者名號權隨群生噐應無量德號稱其悕望皆利安故四者法門權隨其欲性雨甘露法雨應彼根噐盈滿其中如龍王雨無不澤潤故雖乘佛力如是開現一切大眾未覩其實謂如來依本分月輪身所示權道何能充滿一切世界是故婆伽婆令一切大眾於常果法身起深信解故依月輪星流身放大光明漸次普照一切世界令諸大眾尋光開覺覩見如來四種道充滿十方入佛智海趣無餘涅槃故是故顯示光明開覺常果法身不思議無礙攝受一切世間是光明開覺法身智力有十種一者法身常住二者救苦說法三者普應世間四者法身如實五者隨噐出現六者智身寂滅七者常恒清淨八者智照自在九者大悲拔苦十者普應無礙法身常住者是顯示身有二分一者光明開覺二者顯嘆法身光明開覺者是光明開示有三種一者光照此剎二者因光見佛三者新眾生來集光照此剎者經說爾者世尊至一切悉現三千大千者以千為始從千數至千名為小千復以小千為始從千數至千名為中千復以中千為始從千數至千名為大千其中含有百億須彌百億日月四百億四天下四百億四大海三百億三界如來放光悉照其中普現四種不思議權道問曰上放光從面門眉間及齒間出是中何故從足指相輪中放答曰上放光明顯示演說甚深法故從面門眉間放是中開示普應世間以四種權道下攝群生是故從於兩足相輪放光問曰何故放光但應百億而不說普照一切世界答曰為化眾生漸次遍照故因光見佛者於此世界悉見如來坐獅子座奮眾圍繞轉淨梵輪入勝法門故經說如此見佛至亦復如是新眾來集者如來神力十方各有一大菩薩而來雲集何故以神力集令文殊菩薩依光說偈顯示法身常住清淨隨眾生噐應四種權道充滿法界故經說以佛神力故至淨修梵行顯嘆法身文殊菩薩依常身智明顯嘆有五種一者有行平等觀二者依正平等觀三者陰平等觀四者見平等觀五者無我平等觀有行平等觀者依相行則有取受心生於一切法分別捨證見生死可捨見如來涅槃解脫可證非性淨般若真如智如是見者非淨慧眼以法性涅槃無捨證故偈說若有知正覺至彼非淨道眼依正平等觀者法從緣起猶如幻化如實觀察身與依果自性無二於一切法平等同真際如是見佛身者是淨慧眼如法性故偈說若有知如來至彼人難思議陰平等觀者法性涅槃中一切法平等佛與眾生入實相門陰界相盡猶如虗空如經中說觀身實相觀佛亦然寂滅無二故偈說若見我及佛至彼是大牟尼見平等觀者智及境界真如無二自覺清淨故能如是知如來身者則見佛與世而無所起等虗空故偈說見者無所有至彼人大名稱無我平等觀者陰集非有無性故空解法寂滅入不二法門則見如來智無有畏安穩解脫故何故顯示法身常住如一切智入令諸大眾尋光覩見四種種道心無染著離一切相故偈說無我無眾生至智者無所畏救苦說法者光如前說倍增差別是開示法輪攝有二種一者智斷具故能轉法輪二者勸修如聞見證智斷具者是相有六種一者安護故修行智斷以無漏根力調御群生斷癡愛㓨林免熱惱苦置清涼地證道還應為轉法輪法爾調御故二者見見實故修行智斷證真如空遠離二邊同涅槃相轉實法輪故三者證涅槃故修行智斷於無量劫集一切德本度生死此岸達到涅槃法爾應轉清淨梵輪普覺世間故四者降魔故修行智斷以性淨無我無漏聖智降伏四魔無畏勇健直出生死以慈悲智幢現轉法輪無畏說故五者度煩惱漏故修行智斷道種盡慧滅有依依無依諸有漏集逮得涅槃常身智海一念盡見一切法界自在示現轉勝法輪無障碍故六者擊法皷故修行智斷具一切智已興正法雲甘露法雨悉令眾生入安穩智道轉淨法輪自覺法爾故偈說見眾生苦逼至自覺法如是勸修者是勸進相有四種一者界處勸修法性涅槃壞一切有自在雲實應如佛所住常身示現遊諸剎土利安世間故二者果處勸修涅槃如空常恒清淨應以大願歡喜念住故三者悲處勸修在大地獄為惱燒煑應住心如空安穩濟難故四者捨處勸修護大法故勿惜壽命住堅固忍建正法幢是因能至金剛之身不可壞故何故顯示勸修如聞證入解脫果故偈說不壞無量境至彼得如來法普應世間者光如前說倍增差別是普應有二種一者法身自在二者應身普至法身自在者善覺清淨住無餘涅槃故偈說如來覺諸法至調伏群生類應身普至者是云現有九種一者出生方便降身母胎示行人道雖復出生相好具足猶如山王住㝡後身示成正覺普照世間如滿月故二者行攝方便禪思經行集無量功德定慧清淨心無所畏如師子王故三者觀察方便淨眼觀察十方界藏或示戲咲調御眾生故四者身淨方便示末後身大師子吼所轉法輪莫不真實其身清淨如日光故五者棄家方便捨家出家解脫無染修行禪寂入如實際心常志樂住諸佛行取解脫果故六者亦坐道場方便先已善覺一切法相而現坐道場修無漏智道度諸法彼岸以金剛智火滅無明闇正覺諸法成無上道故七者調伏方便以大悲雲遍䨱一切慈光流入諸群生根示以法寶悉調伏故八者轉法輪方便容儀殊特處一切大眾示無畏說神力自在無能映蔽悉攝眾生置如實法故九者滅度非滅度方便噐咸盡故示般涅槃普現佛事如實饒益或復熾然明照世間如千日出普照一切隨根充滿皆令達到究竟菩提故偈說或見初生時至顯現自在法法身如實者光如前說倍增差別是法身如實有十種甚深一者無相甚深法身非有隨群生噐次第現身猶如月王漸增滿足故二者清淨甚深證如智破二種縛一者心緣縛解我無我心相盡故二者界處縛我所法中無所取故離此縛故得二種淨一者智淨涅槃智覺如靈空故二者斷淨於煩惱爾炎地種滅故是淨非念處智常身離盡無邊聖諦故三者解脫甚深自覺聖道離無明闇如日天子普照世間如聲發響應悉對現故四者常身甚深離陰入界入壞無常壞果超出世間住自覺聖地自在無畏如師子王故五者自體淨甚深離一切障自覺解脫如靈空集故六者斷常甚深於有依集起無依集起二種建立住地煩惱菩提智斷故七者同體淨甚深自覺清淨離染障自在無礙悉寂滅故八者爾炎淨甚深智光普入眾生界藏悉建立九者嚴淨甚深集一切依果以無量莊嚴具悉莊嚴故十者空實甚深正覺寂滅有亦有有非有相非無亦無無非無相而能普現說法調御故偈說善逝法甚深至為說清淨法隨噐出現者光如前說倍增差別是依噐出現有十種淨妙業一者慈救淨業於三品人中等心免濟於苦眾生救苦與樂離人天放逸住慈等善根故二者信淨業修念佛三昧堅住不動猶如明鏡淨無垢故三者無漏淨業住性淨法流慧明無穢故無明闇障越生死海故四者身淨業於四威儀不令毀壞心常繫念三昧法中晝夜善觀諸佛境界心不休息趣菩提明處故五者遍修淨業心無怠慢入一切三世勇猛精進攝無餘涅槃故六者真智淨業觀一切法入性淨無我真如法中離我我所無身相故七者觀察淨業善能計量諸眾悉知其小大應彼根噐令離愛染安置如實寂滅法故八者神業淨業於一切佛土示神變力悉令無量群生飲法甘露充滿身心悉安穩故九者計量淨業知一切佛國色集以無礙智明照盡無餘故十者微細計量智明淨業於一切塵悉知其數智明無礙自在教化故何故顯嘆淨業依彼噐水現月王身故偈說離諸人天樂至是彼淨妙業智身寂滅者光如前說倍增差別是智身寂滅有二種一者法身離相二者應身出化法身離相者是寂滅難見有六種一者倒見非真二者色身無邊三者法身離相四者涅槃寂滅五者離盡智淨六者體淨解脫倒見非真者作色相緣佛非淨涅槃欲見佛者是人隨㒹倒行蔽於慧眼不能善達最勝涅槃邪見取相故偈說若以色性大神力至彼為不識最勝法色身無邊者無色離色示一切色相猶如虗空無有能觀見邊際故偈說如來色身形相處至妙色威神不可極法身離相者體淨涅槃如實際離一切色非相所攝而具妙色隨應故偈說非以相好為如來至隨其所應悉能現涅槃寂滅者法性行果如如際住無有量離諸量離集無集過諸合散性相常恒不可說故偈說諸佛正法不可量至其性本來常寂滅離盡智淨者法身智淨離陰界入捨無常壞果證報淨涅槃心行處滅過語言道故偈說不以陰數為如來至言語道斷行處滅體淨解脫者身心離相善覺如實不二不盡常清淨故偈說等觀身心無異相至善逝深遠無所有應身出化者是示現有五種一者流光遍入隨一切法界悉能遠照光覺自在善應群生故二者同躰示現一應示無量無量示一應一處一切處一切處一處無障㝵故三者不動示現身無去來過妄想際而能示現起如幻智應種種身雲故四者隨世間起應妄想生了達自性知無所有悉寂滅故五者究竟示現如涅槃智者則覩導師遠離諸漏故偈說普放妙光明至是則見導師常住清淨者光如前說倍增差別是相有二種一者法身常住二者勸諸菩薩應如實知法身常住者是淨有六種一者自覺超勝法身常住超度四魔自躰無依無能勝者壞無常壞果如金剛故二者能安護世間法身常住自度四魔能與世間為歸依者具一切功德調御群生證涅槃故三者妄想識滅法身常住壞七心壞果覺淨涅槃常恒不變無所依止如虗空故四者壞果不壞法身常住七識滅真心躰淨不為壞法之所壞故五者斷淨法身常住躰自躰虗偽盡如鏡無垢故六者智淨法身常住不思議流住滅真如躰照不二善覺法性故偈說㝡勝自覺超世間至是名善入如來智勸諸菩薩如實知者是勸進有五種一者遠離身心二者無轉示轉三者道淨平等四者法於如住五者無依寂滅遠離身心應如實知者欲入常身深智慧海離諸心念妄想意根能如實了達無疑惑故偈說欲入善逝深法海至永不隨順疑惑心無轉示轉應如實知者轉法輪時知性自性無所轉故偈說一切世界如來境至無上導師方便說道淨平等應如實知者菩提無種種相當離妄想如菩提住故偈說曉了諸法無疑惑至正意思惟佛菩提法相如住應如實知者法非一二假名說量無量而能流布餘益群生故偈說諦了分別諸法時至是知諸佛無量德無依寂滅應如實知者生死涅槃除性無有異除滅憶想如佛住故偈說觀察諸法及眾生至是則了知佛法義智照自在者光如前說倍增差別是智自在有十種常身無㝵方便一者離盡常住二者自覺聖諦三者住深禪寂四者住涅槃性五者等覺隨順六者具十力智七者同真際八者成敗自在九者宿命他心智十者三明自在離盡常住壽命方便者證二種涅槃智無倫匹度生死海起勝彼岸命根難俎如虗空故偈說大智無有量至是則方便力自覺聖諦如實方便者達法緣起入如實際三世一合淨明無二故偈說於諸佛深法至是則方便力住深禪寂示身方便者正受三昧如無所度而能現起身雲如應調伏故偈說常樂觀眾生至是則方便力住涅槃性常恒方便者解脫自在滿平等大慧巧會有無證解脫道故偈說方便善觀察至是則方便力等覺隨順菩提方便者攝一切智究竟如法性善化眾生故偈說隨順調御士至是則方便力具十力智解脫方便者用深廣智慧自覺聖道能到是處非處等諸法彼岸能令眾生背生死道趣涅槃故偈說佛說深法義至是則方便力同真際無㝵方便者到諸法實相心如實虗空善巧無差平等寂滅無障㝵故偈說心如虗空界至是則方便力成敗自在時數方便者善巧念知日月時朔秊歲劫等隨剎成敗如實知故偈說常記念晝夜至是則方便力宿命他心智處方便者於眾生界種種因緣隨諸業果一切遍知故偈說一切群萌類至是則方便力三明自在無㝵方便者智盡三世一切覺故前七種方便善覺真諦巧會有無際實除涅槃性故後三種方便善覺世諦隨無量差別事一念悉知故偈說一切過去世至無比方便力大悲拔苦者光如前說倍增差別是大悲拔苦有十種一者能度難度二者勉彼恐怖三者斷諸放逸四者拔我見地五者與無依為依六者斷邪行結使七者拔苦三有八者勉流住無明住地九者斷無常壞果十者同斷攝能度難度苦大悲者不惜身命修難行苦行度難度海還來法界大師子吼如實利安一切眾生悉令逮得無師智故偈說受持難行法至我令悉當度勉彼恐怖救苦大悲者於生死津濟五煩惱中拯接眾生令離恐怖世雄決定能善利安悉解脫故偈說漂浪生死流至是則佛境界斷諸放逸救苦大悲者以無漏智大滅諸愛欲究竟清淨住如來道故偈說世間諸放逸至是則佛境界拔我見地救苦大悲者以智慧力斷彼眾生邪慢我心遠離亂意住寂滅地故偈說慧者滅本際至是則佛境界與無依為依救苦大悲者斷孤焭眾生諸惡趣苦置清涼處故偈說見彼苦眾生至是則佛境界斷邪行結使救苦大悲者然以智燈而普照之令彼悉捨邪見闇障住無漏智明故偈說迷惑失正路至是則佛境界拔出三有救苦大悲者為漂溺眾生施造法船着濟度脫故偈說一切三有海至是則佛境界勉流注無明住地救苦大悲者於變易生死有漏淵中施設法橋悉皆度脫置法性涅槃故偈說無有本實見至是則佛境界斷無常壞果救苦大悲者以方便生死手於生死獄挽出眾生悉令窮盡三苦邊際究竟達到入涅槃城故偈說見彼生死獄至是則佛境界同類攝救苦大悲者隨緣示現應同彼形令斷恐怖心無疑惑悉寂滅故偈說聞佛甚深法至是則天人師普應無㝵者光明遍照一切法界悉開示故是自在相有二種一者光網普覺一切世間二者開示法身一切現化光網普覺者流光普照一切法界悉令大眾見法身權道充滿世間自在攝化盡無餘故經說爾時光明至淨修梵行開示法身一切現化者是法身自在有七種一者十力智二者覺示現無㝵三者妙行清淨四者心淨觀察五者妙音示現六者見佛不存其相七者身藏不思議十力智者知法界境界三明達到一念照盡而無去來湛然寂滅故偈說無量無數劫至具足十種力自覺示現無㝵者起諸依果隨如如相十方斯現猶如大雲悉普覆故偈說無㝵大名稱至十力靡不見妙行清淨者證法身依果處彼現化令一切眾生歡喜信樂悉得自在無㝵解脫故偈說從始供養佛至速逮無上道心淨觀察者覩如來身解一切法入如實際同淨法身住佛所住故偈說能問十方佛至斯人等如來妙音示現者轉淨法輪逮無上智雨甘露法雨澤潤群生故偈說聞佛妙音聲至甚深難知見見佛不存相者知佛法身是涅槃事不可以有無緣如盲對色寂然不取故偈說㝡勝所說法至乃見真如來身藏不思議者一切世界悉入其中而無障㝵如處虗空無有來去示成敗相一切圓俻充滿虗空故偈說眾生種種業至充滿虗空界聖者文殊如是於一切處依大光明方便以偈顯示法身無為常住隨眾生噐現四種道充滿法界大眾覩見於常果法身令得正解何以故知佛法身猶如滿月不一不異一切現化故
